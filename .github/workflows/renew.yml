name: Zenix Auto Renew OCR

on:
  schedule:
    - cron: '0 0 */2 * *' # Every 2 days
  workflow_dispatch:      # Para ma-test mo nang manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
          pip install selenium pytesseract Pillow webdriver-manager

      - name: Run Script
        env:
          ZENIX_RENEW_LINK: ${{ secrets.ZENIX_RENEW_LINK }}
        run: python renew.py
        
